<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Authentification | CRM IA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="text-center" style="margin-bottom: 2rem;">
            <a href="index.html" class="logo">CRM<span>AI</span></a>
            <p style="margin-top: 0.5rem; color: #64748b;">Espace Entreprise</p>
        </div>

        <div id="login-section">
            <h2 class="text-center" style="margin-bottom: 1.5rem;">Se connecter</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email professionnel</label>
                    <input type="email" required placeholder="nom@entreprise.com">
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" required placeholder="••••••••" value="demo123">
                </div>
                <button type="submit" id="btn-login" class="btn btn-primary">Connexion</button>
            </form>
            <p class="text-center" style="margin-top: 1.5rem; font-size: 0.9rem;">
                Nouveau sur CRMAI ? <a href="#" id="link-to-signup" style="color: var(--primary); font-weight: 600;">Créer un compte</a>
            </p>
        </div>

        <div id="signup-section" style="display: none;">
            <h2 class="text-center" style="margin-bottom: 1.5rem;">Créer mon compte</h2>
            <form id="signup-form">
                <div class="form-group">
                    <label>Nom de l'entreprise</label>
                    <input type="text" required placeholder="Ex: Tech Store">
                </div>
                <div class="form-group">
                    <label>Email professionnel</label>
                    <input type="email" required placeholder="nom@entreprise.com">
                </div>
                <div class="form-group">
                    <label>Créer un mot de passe</label>
                    <input type="password" required placeholder="••••••••">
                </div>
                <button type="submit" id="btn-signup" class="btn btn-primary">S'inscrire gratuitement</button>
            </form>
            <p class="text-center" style="margin-top: 1.5rem; font-size: 0.9rem;">
                Déjà un compte ? <a href="#" id="link-to-login" style="color: var(--primary); font-weight: 600;">Se connecter</a>
            </p>
        </div>

    </div>

    <script src="script.js"></script> 
</body>
</html>
