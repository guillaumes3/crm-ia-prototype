<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion | CRM IA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="text-center" style="margin-bottom: 2rem;">
            <a href="index.html" class="logo">CRM<span>AI</span></a>
            <p style="margin-top: 0.5rem;">Espace Entreprise</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label>Email professionnel</label>
                <input type="email" required placeholder="nom@entreprise.com">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" required placeholder="••••••••" value="demo123">
            </div>
            <button type="submit" id="btn-login" class="btn btn-primary">Se connecter</button>
        </form>
    </div>

    <script src="script.js"></script> 
</body>
</html>
