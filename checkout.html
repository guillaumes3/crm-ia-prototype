<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Paiement Sécurisé | CRM AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-auth">

    <div class="container" style="max-width: 1000px; padding: 40px 20px;">
        <div style="margin-bottom: 2rem;">
            <a href="tarifs.html" style="color: var(--text); text-decoration: none;">← Retour aux tarifs</a>
        </div>

        <div class="grid" style="grid-template-columns: 1.5fr 1fr; align-items: start; gap: 3rem;">
            
            <div class="stat-card" style="padding: 3rem;">
                <h2 style="margin-bottom: 1.5rem;">Informations de paiement</h2>
                
                <form id="payment-form">
                    <div class="form-group">
                        <label>Nom sur la carte</label>
                        <input type="text" placeholder="Jean Dupont" required>
                    </div>

                    <div class="form-group">
                        <label>Numéro de carte</label>
                        <div style="position: relative;">
                            <input type="text" placeholder="4242 4242 4242 4242" required style="padding-left: 45px;">
                            <span style="position: absolute; left: 15px; top: 12px;">💳</span>
                        </div>
                    </div>

                    <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>Expiration (MM/AA)</label>
                            <input type="text" placeholder="12/26" required>
                        </div>
                        <div class="form-group">
                            <label>CVC</label>
                            <input type="text" placeholder="123" required>
                        </div>
                    </div>

                    <button type="submit" id="btn-pay" class="btn btn-primary" style="margin-top: 2rem; font-size: 1.1rem; padding: 1.2rem;">
                        Payer 99,00 € et activer mon compte
                    </button>
                    
                    <p style="text-align: center; margin-top: 1rem; font-size: 0.8rem; color: #64748b;">
                        🔒 Paiement sécurisé par cryptage SSL 256-bit
                    </p>
                </form>
            </div>

            <div style="background: #f1f5f9; padding: 2rem; border-radius: 16px;">
                <h3 style="margin-bottom: 1.5rem;">Récapitulatif</h3>
                
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                    <span>Forfait Business Pro (HT)</span>
                    <span style="font-weight: bold;">82,50 €</span>
                </div>
                
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; color: #64748b;">
                    <span>TVA (20%)</span>
                    <span>16,50 €</span>
                </div>
                
                <hr style="border: none; border-top: 1px solid #cbd5e1; margin: 1.5rem 0;">
                
                <div style="display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: 800; color: var(--dark);">
                    <span>Total TTC à payer</span>
                    <span>99,00 €</span>
                </div>

                <div style="margin-top: 2rem; padding: 1rem; background: #dbeafe; border-radius: 8px; font-size: 0.9rem; color: #1e40af;">
                    ✨ <b>Offre de lancement :</b> 7 jours d'essai offerts, vous ne serez débité qu'après cette période.
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
